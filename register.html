<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f7fa;
}

.box{
width:350px;
margin:100px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="box">

<h3 class="text-center">Register</h3>

<input id="name" class="form-control mb-2" placeholder="Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary w-100" onclick="register()">Register</button>

<p class="text-center mt-3">
Already have account? 
<a href="login.html">Login</a>
</p>
</div>

<script>

async function register(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!name || !email || !password){
alert("Fill all fields");
return;
}

const res = await fetch("http://localhost:5000/api/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({name,email,password})
});

const data = await res.text();

if(res.status === 400){
    showToast(data, "error");
    return;
}

// ✅ Success
showToast(data);;

// OPTIONAL: auto login (BEST UX)
const loginRes = await fetch("https://fileshare-backend-9tyy.onrender.com/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({email,password})
});

const loginData = await loginRes.json();

localStorage.setItem("token", loginData.token);

// 👉 redirect to dashboard
window.location = "index.html";

}

function showToast(message, type="success"){

const toastEl = document.getElementById("toastBox");
const toastMsg = document.getElementById("toastMsg");

// Change color based on type
toastEl.classList.remove("text-bg-success","text-bg-danger");

if(type === "error"){
toastEl.classList.add("text-bg-danger");
}else{
toastEl.classList.add("text-bg-success");
}

toastMsg.innerText = message;

const toast = new bootstrap.Toast(toastEl);
toast.show();

}
</script>
<!-- Toast -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
  <div id="toastBox" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">
        Success Message
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
</body>
</html>
